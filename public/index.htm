<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blogs App</title>
    <link rel="stylesheet" href="./assets/style.css">
</head>

<body>
    <div id="auth-container">
        <h2>Register</h2>
            <input type="text" placeholder="Username" id="registerUsername">
            <input type="email" placeholder="Email" id="registerEmail">
            <input type="password" placeholder="Password" id="registerPassword">
            <button id="registerButton" onclick="registerUser()">Register</button>

        <h2>Login</h2>
            <input type="email" placeholder="Email" id="loginEmail">
            <input type="password" placeholder="Password" id="loginPassword">
            <button id="loginButton" onclick="login()">Login</button>

        <h2>Logout</h2>
            <button id="logout-button" onclick="logout()">Logout</button>
    </div>

    <div id="app-container" class="container hidden">
      
        <h2>Create a Post</h2>
            <h3>Title</h3>
            <input type="text" placeholder="Title" id="postTitle">
            <h3>Content</h3>
            <textarea placeholder="Content" id="postContent"></textarea>
            <h3>Category</h3>
            <label for="category">Choose a category:</label>
            <select name="category" id="postCategory">
                <option value="technology">Technology</option>
                <option value="lifestyle">Lifestyle</option>
                <option value="travel">Travel</option>
                <option value="food">Food</option>
                <option value="education">Education</option>
            </select>
            <button id="create-post-button" onclick="createPost()">Create Post</button>


        <h2>Posts</h2>
            <h3>This is where posts will be Searched</h3>
            <select name="filter-category" id="filterCategory" onchange="filterPostsByCategory()">
                <option value="">All Categories</option>
                <option value="technology">Technology</option>
                <option value="lifestyle">Lifestyle</option>
                <option value="travel">Travel</option>
                <option value="food">Food</option>
                <option value="education">Education</option>
            </select>
            <button id="loadPostsButton" onclick="loadPosts()">Load Posts</button>
            <h3>add functionality to allow posts to be filtered by category</h3>
    </div>

    <div id="postsContainer" class="container hidden">
        <h2>Posts</h2>
        <div id="posts-list"></div>
    </div>

    <script src="./assets/script.js"></script>
</body>
</html>
